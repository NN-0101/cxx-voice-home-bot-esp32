; ==============================================================================
; PlatformIO 项目配置文件（ESP32-PICO-DevKitM-2）
; 文档参考：https://docs.platformio.org/page/projectconf.html
; ==============================================================================

; -------------------------- 开发环境核心配置 --------------------------
[env:esp32-pico-devkitm-2]
; 指定硬件平台：乐鑫ESP32系列
platform = espressif32
; 指定开发板型号（需与硬件匹配）
board = esp32-pico-devkitm-2
; 指定开发框架：Arduino（简化开发）
framework = arduino

; -------------------------- 上传/调试配置 --------------------------
; Flash闪存大小（与硬件实际Flash匹配，ESP32-PICO-DevKitM-2 默认4MB）
board_upload.flash_size = 4MB
; 串口监视器波特率（需与代码中Serial.begin()参数一致）
monitor_speed = 115200

; 添加SPIFFS分区配置
board_build.partitions = default.csv
board_build.filesystem = spiffs

; 库依赖
lib_deps =
; ESP32舵机库esp32servo
; OLED显示屏库
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.5
; WebSocket库
    links2004/WebSockets @ ^2.3.5
; WiFi管理库
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
; I2S音频库
    earlephilhower/ESP8266Audio @ ^1.9.7
; JSON 库（必需）
    bblanchon/ArduinoJson @ ^6.21.3

; 编译优化
build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=0

; -------------------------- 可选扩展配置（示例） --------------------------
; 上传波特率（加快上传速度，按需开启）
; board_upload.speed = 921600
; 编译优化等级（-Os 平衡体积和性能）
; build_flags = -Os